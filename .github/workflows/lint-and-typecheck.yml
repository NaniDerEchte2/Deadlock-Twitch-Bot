name: "🔍 Lint & Type Check"

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruff:
    name: "⚡ Ruff (CI-critical targets)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install lint tooling
        run: python -m pip install --require-hashes -r .github/requirements-tools-locked.txt

      - name: Run Ruff on curated targets
        run: |
          targets=(
            bot/secret_store.py
            bot/raid/views.py
            bot/dashboard_service/app.py
            tests/test_raid_views_split_api.py
            tests/test_split_bot_api_client.py
            tests/test_dashboard_import_boundaries.py
            tests/test_live_announcement_integration.py
            scripts/test_checkout.py
          )
          existing=()
          for target in "${targets[@]}"; do
            if [ -e "$target" ]; then
              existing+=("$target")
            fi
          done

          if [ ${#existing[@]} -eq 0 ]; then
            echo "No curated lint targets found."
            exit 0
          fi

          printf 'Ruff targets: %s\n' "${existing[*]}"
          ruff check "${existing[@]}" --output-format=github --target-version=py311
          ruff format "${existing[@]}" --check --target-version=py311

  pytest:
    name: "✅ Pytest"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[test]"

      - name: Run regression suite
        run: pytest -q
