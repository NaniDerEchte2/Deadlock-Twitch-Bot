name: "🔍 Lint & Type Check"

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruff:
    name: "⚡ Ruff (Lint & Format)"
    if: hashFiles('**/*.py') != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Install lint tooling
        run: python -m pip install --require-hashes -r .github/requirements-tools-locked.txt

      - name: Run Ruff Check
        run: ruff check . --output-format=github --target-version=py311

      - name: Run Ruff Format Check
        run: ruff format . --check --target-version=py311

  mypy:
    name: "🎯 Mypy (Static Type Check)"
    if: hashFiles('**/*.py') != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Install typing tooling
        run: python -m pip install --require-hashes -r .github/requirements-tools-locked.txt

      - name: Run Mypy on detected source directories
        run: |
          targets=()
          for dir in bot cogs service src twitch_cog tests scripts; do
            if [ -d "$dir" ]; then
              targets+=("$dir")
            fi
          done

          if [ ${#targets[@]} -eq 0 ]; then
            echo "No known source directories found. Running mypy against repository root."
            mypy . --ignore-missing-imports --follow-imports=skip --install-types --non-interactive
            exit 0
          fi

          printf 'Detected mypy targets: %s\n' "${targets[*]}"
          mypy "${targets[@]}" --ignore-missing-imports --follow-imports=skip --install-types --non-interactive
