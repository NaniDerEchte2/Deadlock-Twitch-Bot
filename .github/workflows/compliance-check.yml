name: "✅ Compliance Check (Optimized)"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ============================================================================
  # DOCUMENTATION CHECK (ALWAYS RUNS)
  # ============================================================================
  documentation:
    name: 📚 Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check Essential Documentation
        run: |
          echo "# Documentation Quality" > docs-report.md
          echo "" >> docs-report.md
          echo "## Essential Files:" >> docs-report.md
          
          # README
          if [ -f README.md ]; then
            lines=$(wc -l < README.md)
            echo "✅ README.md exists ($lines lines)" >> docs-report.md
          else
            echo "❌ README.md missing" >> docs-report.md
          fi
          
          # LICENSE
          if [ -f LICENSE ] || [ -f LICENSE.md ] || [ -f LICENSE.txt ]; then
            echo "✅ LICENSE file exists" >> docs-report.md
          else
            echo "⚠️ LICENSE file missing" >> docs-report.md
          fi
          
          # CONTRIBUTING
          if [ -f CONTRIBUTING.md ] || [ -f .github/CONTRIBUTING.md ]; then
            echo "✅ CONTRIBUTING guide exists" >> docs-report.md
          else
            echo "ℹ️ CONTRIBUTING guide not found" >> docs-report.md
          fi
          
          # Security Policy
          if [ -f SECURITY.md ] || [ -f .github/SECURITY.md ]; then
            echo "✅ Security policy exists" >> docs-report.md
          else
            echo "ℹ️ Security policy not found" >> docs-report.md
          fi
          
          cat docs-report.md

      - name: Upload Documentation Report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: documentation-check
          path: docs-report.md
          if-no-files-found: ignore

  # ============================================================================
  # GIT HYGIENE (ALWAYS RUNS)
  # ============================================================================
  git-hygiene:
    name: 🔀 Git Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check Git Best Practices
        run: |
          echo "# Git Hygiene Report" > git-report.md
          echo "" >> git-report.md
          
          # .gitignore
          echo "## .gitignore Check:" >> git-report.md
          if [ -f .gitignore ]; then
            echo "✅ .gitignore exists" >> git-report.md
            
            # Common patterns
            [ -n "$(grep 'node_modules' .gitignore 2>/dev/null)" ] && echo "✅ Ignores node_modules" >> git-report.md || echo "ℹ️ Add node_modules to .gitignore" >> git-report.md
            [ -n "$(grep '\.env' .gitignore 2>/dev/null)" ] && echo "✅ Ignores .env" >> git-report.md || echo "⚠️ Add .env to .gitignore" >> git-report.md
            [ -n "$(grep '__pycache__' .gitignore 2>/dev/null)" ] && echo "✅ Ignores __pycache__" >> git-report.md || echo "ℹ️ Add __pycache__ to .gitignore" >> git-report.md
          else
            echo "⚠️ No .gitignore found" >> git-report.md
          fi
          
          # Large files
          echo "" >> git-report.md
          echo "## Large Files (>5MB):" >> git-report.md
          large=$(find . -type f -size +5M 2>/dev/null | grep -v ".git" | head -5)
          if [ -z "$large" ]; then
            echo "✅ No large files" >> git-report.md
          else
            echo "⚠️ Large files found:" >> git-report.md
            echo "$large" >> git-report.md
          fi
          
          # Sensitive files
          echo "" >> git-report.md
          echo "## Sensitive Files Check:" >> git-report.md
          sensitive=$(find . \( -name "*.pem" -o -name "*.key" -o -name "*.p12" -o -name "id_rsa*" \) 2>/dev/null | grep -v ".git" | head -5)
          if [ -z "$sensitive" ]; then
            echo "✅ No sensitive files" >> git-report.md
          else
            echo "🚨 CRITICAL: Sensitive files found!" >> git-report.md
            echo "$sensitive" >> git-report.md
          fi
          
          cat git-report.md

      - name: Upload Git Report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: git-hygiene
          path: git-report.md
          if-no-files-found: ignore

  # ============================================================================
  # CODE STYLE (PYTHON ONLY IF EXISTS)
  # ============================================================================
  python-style:
    name: 🎨 Python Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Install Analysis Tools
        run: python -m pip install --require-hashes -r .github/requirements-tools-locked.txt

      - name: Check Python Style
        run: |
          echo "# Python Style Report" > python-style.md
          echo "" >> python-style.md
          
          # Ruff
          echo "## Ruff Linting:" >> python-style.md
          ruff check . --output-format=text >> python-style.md 2>&1 || echo "Issues found" >> python-style.md
          
          cat python-style.md
        continue-on-error: true

      - name: Upload Style Report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: python-style
          path: python-style.md
          if-no-files-found: ignore

  # ============================================================================
  # SUMMARY
  # ============================================================================
  summary:
    name: 📊 Compliance Summary
    needs: [documentation, git-hygiene, python-style]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Create Summary
        run: |
          echo "# ✅ Compliance & Best Practices Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Checks Completed:" >> $GITHUB_STEP_SUMMARY
          echo "- Documentation: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Git Hygiene: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Python Style: ${{ needs.python-style.result == 'success' && '✅' || needs.python-style.result == 'skipped' && '⏭️ Skipped' || '⚠️' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📋 Check artifacts for detailed reports" >> $GITHUB_STEP_SUMMARY
