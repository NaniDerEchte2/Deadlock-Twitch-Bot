name: "Secret Scanning"

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    - cron: "20 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Block tracked secret material files
        run: |
          forbidden=$(git ls-files | grep -E '(^|/)(\.env(\..*)?|id_rsa|id_dsa|machine_auth_token\.txt|refresh\.token|oauth_tokens?.*|.*\.pem|.*\.key)$' || true)
          if [ -n "$forbidden" ]; then
            echo "::error::Tracked secret material files detected:"
            echo "$forbidden"
            exit 1
          fi

      - name: Run Gitleaks (strict)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_SUMMARY: true

  trivy-secrets:
    name: Trivy Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Trivy Secret Scanner
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518 # master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'secret'
          skip-dirs: 'node_modules,.venv,venv,dist,build'
          format: 'sarif'
          output: 'trivy-secrets.sarif'
          severity: 'LOW,MEDIUM,HIGH,CRITICAL'
          exit-code: 1

      - name: Upload Trivy Secret SARIF
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4
        if: always() && hashFiles('trivy-secrets.sarif') != ''
        with:
          sarif_file: 'trivy-secrets.sarif'
          category: 'trivy-secrets'

      - name: Upload Trivy Secret Artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: always()
        with:
          name: trivy-secret-report
          path: trivy-secrets.sarif
          if-no-files-found: ignore
