name: "Dependabot Auto Merge"

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  auto-merge:
    name: "Auto-merge trusted Dependabot updates"
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2.5.0
        with:
          alert-lookup: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide eligibility
        id: gate
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          ALERT_STATE: ${{ steps.metadata.outputs.alert-state }}
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          DIRECTORY: ${{ steps.metadata.outputs.directory }}
          MAINTAINER_CHANGES: ${{ steps.metadata.outputs.maintainer-changes }}
          NEW_VERSION: ${{ steps.metadata.outputs.new-version }}
          PACKAGE_ECOSYSTEM: ${{ steps.metadata.outputs.package-ecosystem }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
        with:
          script: |
            const names = (process.env.DEPENDENCY_NAMES || "")
              .split(",")
              .map((value) => value.trim())
              .filter(Boolean);
            const updateType = process.env.UPDATE_TYPE || "";
            const securityUpdate = (process.env.ALERT_STATE || "").toUpperCase() === "OPEN";
            const maintainerChanges = (process.env.MAINTAINER_CHANGES || "").toLowerCase() === "true";
            const ecosystem = process.env.PACKAGE_ECOSYSTEM || "";
            const directory = process.env.DIRECTORY || "";
            const newVersion = process.env.NEW_VERSION || "";

            let shouldMerge = false;
            let reason = "unsupported update type";

            if (maintainerChanges) {
              reason = "maintainer changes detected";
            } else if (securityUpdate) {
              shouldMerge = true;
              reason = "security update";
            } else if (
              updateType === "version-update:semver-patch" ||
              updateType === "version-update:semver-minor"
            ) {
              shouldMerge = true;
              reason = updateType;
            }

            if (
              shouldMerge &&
              ecosystem === "npm" &&
              directory === "/bot/dashboard_v2" &&
              names.includes("eslint") &&
              /^10(\.|$)/.test(newVersion)
            ) {
              shouldMerge = false;
              reason = "eslint 10 remains blocked in /bot/dashboard_v2";
            }

            core.setOutput("should_merge", shouldMerge ? "true" : "false");
            core.setOutput("reason", reason);
            core.notice(`Auto-merge decision: ${shouldMerge} (${reason})`);

      - name: Auto-approve PR
        if: steps.gate.outputs.should_merge == 'true' && github.event.pull_request.draft == false
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const alreadyApproved = reviews.some(
              (review) =>
                review.user?.login === "github-actions[bot]" &&
                review.state === "APPROVED",
            );

            if (alreadyApproved) {
              core.notice(`PR #${pull_number} is already approved by github-actions[bot].`);
              return;
            }

            await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number,
              event: "APPROVE",
              body: "Auto-approved trusted Dependabot update after policy checks.",
            });

      - name: Enable auto-merge
        if: steps.gate.outputs.should_merge == 'true' && github.event.pull_request.draft == false
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const pullRequestId = context.payload.pull_request.node_id;

            try {
              await github.graphql(
                `
                  mutation EnableAutoMerge($pullRequestId: ID!) {
                    enablePullRequestAutoMerge(
                      input: { pullRequestId: $pullRequestId, mergeMethod: SQUASH }
                    ) {
                      pullRequest {
                        number
                      }
                    }
                  }
                `,
                { pullRequestId },
              );
              core.notice(`Auto-merge enabled for PR #${context.payload.pull_request.number}.`);
            } catch (error) {
              core.warning(`Could not enable auto-merge: ${error.message}`);
            }

      - name: Skip note
        if: steps.gate.outputs.should_merge != 'true'
        run: |
          echo "Dependabot PR does not meet auto-merge policy: ${{ steps.gate.outputs.reason }}"
