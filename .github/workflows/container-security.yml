name: "🐳 Container Security (Optimized)"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
jobs:
  # ============================================================================
  # CHECK IF DOCKER/CONTAINER FILES EXIST
  # ============================================================================
  detect-container-files:
    name: 🔍 Detect Container Files
    runs-on: ubuntu-latest
    outputs:
      has_dockerfile: ${{ steps.check.outputs.has_dockerfile }}
      has_compose: ${{ steps.check.outputs.has_compose }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Check for Container Files
        id: check
        run: |
          # Check for Dockerfile
          if find . -name "Dockerfile*" -o -name "*.dockerfile" | grep -q .; then
            echo "has_dockerfile=true" >> $GITHUB_OUTPUT
            echo "✅ Dockerfile found"
          else
            echo "has_dockerfile=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No Dockerfile found - container scans will be skipped"
          fi
          
          # Check for docker-compose
          if [ -f docker-compose.yml ] || [ -f docker-compose.yaml ]; then
            echo "has_compose=true" >> $GITHUB_OUTPUT
            echo "✅ docker-compose file found"
          else
            echo "has_compose=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No docker-compose file found"
          fi

  # ============================================================================
  # CONTAINER SAST SCANNERS (RESTORED CORE COVERAGE)
  # ============================================================================
  container-sast:
    name: 🔒 Container SAST Scanners
    needs: detect-container-files
    if: needs.detect-container-files.outputs.has_dockerfile == 'true' || needs.detect-container-files.outputs.has_compose == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkov Dockerfile Scan
        if: needs.detect-container-files.outputs.has_dockerfile == 'true'
        uses: bridgecrewio/checkov-action@f99709f8ccc3496220c987b7d8729653237c23dc # master
        with:
          directory: .
          framework: dockerfile
          output_format: sarif
          output_file_path: checkov-docker.sarif
          soft_fail: false
      - name: Upload Checkov Dockerfile SARIF
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4
        if: always() && hashFiles('checkov-docker.sarif') != ''
        with:
          sarif_file: checkov-docker.sarif
          category: checkov-docker
      - name: Checkov Compose Scan
        if: needs.detect-container-files.outputs.has_compose == 'true'
        uses: bridgecrewio/checkov-action@f99709f8ccc3496220c987b7d8729653237c23dc # master
        with:
          directory: .
          framework: docker_compose
          output_format: sarif
          output_file_path: checkov-compose.sarif
          soft_fail: false
      - name: Upload Checkov Compose SARIF
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4
        if: always() && hashFiles('checkov-compose.sarif') != ''
        with:
          sarif_file: checkov-compose.sarif
          category: checkov-compose
      - name: Trivy Container Filesystem Scan (SARIF)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-docker.sarif
          severity: HIGH,CRITICAL
          exit-code: 1
      - name: Upload Trivy Container SARIF
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4
        if: always() && hashFiles('trivy-docker.sarif') != ''
        with:
          sarif_file: trivy-docker.sarif
          category: trivy-docker
      - name: Upload Container SAST Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: container-sast-reports
          path: |
            checkov-docker.sarif
            checkov-compose.sarif
            trivy-docker.sarif
          if-no-files-found: ignore

  # ============================================================================
  # DOCKERFILE LINTING - ONLY IF DOCKERFILE EXISTS
  # ============================================================================
  dockerfile-lint:
    name: 🐋 Dockerfile Linting
    needs: detect-container-files
    if: needs.detect-container-files.outputs.has_dockerfile == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Hadolint - Dockerfile Linter
      - name: Hadolint Dockerfile Scan
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
          format: sarif
          output-file: hadolint.sarif
          no-fail: false
      - name: Upload Hadolint SARIF
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4
        if: always() && hashFiles('hadolint.sarif') != ''
        with:
          sarif_file: hadolint.sarif
          category: 'hadolint'
      - name: Upload Hadolint Report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: hadolint-report
          path: hadolint.sarif
          if-no-files-found: ignore

  # ============================================================================
  # DOCKER COMPOSE VALIDATION - ONLY IF COMPOSE EXISTS
  # ============================================================================
  compose-validate:
    name: 🔧 Docker Compose Validation
    needs: detect-container-files
    if: needs.detect-container-files.outputs.has_compose == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate Docker Compose
        run: |
          if [ -f docker-compose.yml ]; then
            echo "Validating docker-compose.yml..."
            docker compose -f docker-compose.yml config > /dev/null && echo "✅ Valid" || echo "⚠️ Invalid"
          fi
          if [ -f docker-compose.yaml ]; then
            echo "Validating docker-compose.yaml..."
            docker compose -f docker-compose.yaml config > /dev/null && echo "✅ Valid" || echo "⚠️ Invalid"
          fi
  # ============================================================================
  # BEST PRACTICES CHECK - ONLY IF DOCKERFILE EXISTS
  # ============================================================================
  best-practices:
    name: ⚡ Container Best Practices
    needs: detect-container-files
    if: needs.detect-container-files.outputs.has_dockerfile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check Security Best Practices
        run: |
          echo "# Container Security Analysis" > container-analysis.md
          echo "" >> container-analysis.md
          
          # Check for root user
          if grep -r "USER root" . --include="Dockerfile*" > /dev/null 2>&1; then
            echo "⚠️ WARNING: Root user found in Dockerfile" >> container-analysis.md
          else
            echo "✅ Good: No explicit root user usage" >> container-analysis.md
          fi
          
          # Check for latest tag
          if grep -r ":latest" . --include="Dockerfile*" > /dev/null 2>&1; then
            echo "⚠️ WARNING: Using :latest tag found" >> container-analysis.md
          else
            echo "✅ Good: No :latest tags found" >> container-analysis.md
          fi
          
          # Check for secrets
          if grep -rE "(PASSWORD|SECRET|TOKEN|KEY)=" . --include="Dockerfile*" > /dev/null 2>&1; then
            echo "🚨 CRITICAL: Potential secrets in Dockerfile!" >> container-analysis.md
          else
            echo "✅ Good: No obvious secrets in Dockerfile" >> container-analysis.md
          fi
          
          # Check for healthcheck
          if grep -r "HEALTHCHECK" . --include="Dockerfile*" > /dev/null 2>&1; then
            echo "✅ Good: HEALTHCHECK found" >> container-analysis.md
          else
            echo "ℹ️ INFO: No HEALTHCHECK defined" >> container-analysis.md
          fi
          
          cat container-analysis.md

      - name: Upload Analysis
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: container-best-practices
          path: container-analysis.md
          if-no-files-found: ignore

  # ============================================================================
  # SUMMARY
  # ============================================================================
  summary:
    name: 📊 Container Security Summary
    needs: [detect-container-files, container-sast, dockerfile-lint, compose-validate, best-practices]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Create Summary
        run: |
          echo "# 🐳 Container Security Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Files Detected:" >> $GITHUB_STEP_SUMMARY
          echo "- Dockerfile: ${{ needs.detect-container-files.outputs.has_dockerfile == 'true' && '✅ Found' || '❌ Not found' }}" >> $GITHUB_STEP_SUMMARY
          echo "- docker-compose: ${{ needs.detect-container-files.outputs.has_compose == 'true' && '✅ Found' || '❌ Not found' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.detect-container-files.outputs.has_dockerfile }}" == "false" ]; then
            echo "ℹ️ **No container files found - all checks were skipped**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "To enable container scanning, add a Dockerfile to your repository." >> $GITHUB_STEP_SUMMARY
          else
            echo "## Scans Executed:" >> $GITHUB_STEP_SUMMARY
            echo "- Container SAST: ${{ needs.container-sast.result == 'success' && '✅' || needs.container-sast.result == 'skipped' && '⏭️' || '❌' }}" >> $GITHUB_STEP_SUMMARY
            echo "- Dockerfile Linting: ${{ needs.dockerfile-lint.result == 'success' && '✅' || needs.dockerfile-lint.result == 'skipped' && '⏭️' || '❌' }}" >> $GITHUB_STEP_SUMMARY
            echo "- Compose Validation: ${{ needs.compose-validate.result == 'success' && '✅' || needs.compose-validate.result == 'skipped' && '⏭️' || '❌' }}" >> $GITHUB_STEP_SUMMARY
            echo "- Best Practices: ${{ needs.best-practices.result == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          fi
